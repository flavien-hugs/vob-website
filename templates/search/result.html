{% for object in items %}
    <a class="single-result-article" href="{{ object.object.get_absolute_url }}">
        <div class="result-img">
            <img src="{{ object.object.get_image_url }}" alt="{{ object.object.name|slugify }}">
        </div>
        <div class="result-content">
            <h4>{{ object.object.name|truncatewords:10 }}</h4>
            <div class="">
                {{ object.object.date }}
            </div>
        </div>
    </a>
{% empty %}
    <p class="pt-3 pb-1 px-5">
        Aucun object ne correspond à votre recherche.
    </p>
{% endfor %}
