{% if is_paginated %}
	<nav class="col-lg-12 col-md-12 col-sm-12" aria-label="navigation">
		<ul class="pagination justify-content-center">
			{% if page_obj.has_previous %}
                <li class="page-item">
                    <a class="page-link shadow-none" href="?page={{ page_obj.previous_page_number }}" aria-label="Précédent">
                        <span aria-hidden="true">Précédent</span>
                    </a>
                </li>
            {% else %}
                <li class="page-item">
                    <a class="page-link shadow-none" href="?page=1" aria-label="Précédent">
                        <span aria-hidden="true">Précédent</span>
                    </a>
                </li>
            {% endif %}

            <li class="page-item {% if page_obj.number %} active {% endif %} d-none d-sm-block">
                <a class="page-link shadow-none" href="?page={{ page_obj.number }}">
                	{{ page_obj.number }}
                </a>
            </li>

            {% if page_obj.has_next %}
                <li class="page-item">
                    <a class="page-link shadow-none" href="?page={{ page_obj.paginator.num_pages }}">
                       <span aria-hidden="true">{{ page_obj.paginator.num_pages }}</span>
                    </a>
                </li>
                <li class="page-item">
                    <a class="page-link shadow-none" href="?page={{ page_obj.next_page_number }}" aria-label="Suivant">
                       <span aria-hidden="true">Suivant</span>
                    </a>
                </li>
            {% endif %}
		</ul>
	</nav>
{% endif %}
