{% url 'home' as home_url %}
{% url 'post:post_list' as post_list_url %}
{% url 'book:book_list' as book_list_url %}
{% url 'course:course_list' as course_list_url %}

<nav class="navbar navbar-expand-lg navbar-default sticky-top">
    <div class="container px-0">
        <a class="navbar-brand" href="{{ home_url }}">
            <img src="{{ STATIC_PREFIX }}img/logo.svg" alt="{{ title }}"/>
        </a>

        <button
            class="navbar-toggler collapsed shadow-none"
            type="button" data-bs-toggle="collapse"
            data-bs-target="#navbar-default"
            aria-controls="navbar-default"
            aria-expanded="false">
            <span class="icon-bar top-bar mt-0"></span>
            <span class="icon-bar middle-bar"></span>
            <span class="icon-bar bottom-bar"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar-default">
            
            <form class="mt-3 mt-lg-0 mx-lg-5 d-flex align-items-center w-100">
                <input autocomplete="false" role="search" type="search"
                class="form-control ps-6 rounded-0 shadow-none"
                placeholder="Je cherche ..." required>
                <span class="position-absolute ps-3 search-icon">
                    <i class="fe fe-search"></i>
                </span>
            </form>

            <ul class="navbar-nav navbar-right-wrap">
                <li class="nav-item">
                    <a href="{{ course_list_url }}" class="nav-link text-capitalize">
                        formation
                    </a>
                </li>

                <li class="nav-item">
                    <a href="{{ book_list_url }}" class="nav-link text-capitalize">
                        livre
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link nav-link text-capitalize" href="{{ post_list_url }}">
                        blog
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link text-capitalize" href="/contact/">
                        contact
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
